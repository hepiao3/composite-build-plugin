import groovy.json.JsonSlurper

// Composite Build Manager (CBM) - Auto-generated by CBM plugin, do not edit manually.

// 多个 included build 中普遍存在的通用模块名，不作为 artifact 依赖，过滤掉以避免 ambiguous substitution
def COMMON_MODULE_NAMES = ["app", "application", "sample", "demo", "test"] as Set

/** 从 included build 的 settings.gradle 中提取所有 project 名称（含 rootProject.name） */
def getIncludedProjectNames = { File buildDir ->
    def names = [] as Set
    def settingsFile = ["settings.gradle", "settings.gradle.kts"]
        .collect { new File(buildDir, it) }
        .find { it.exists() }
    if (!settingsFile) return names
    settingsFile.eachLine { line ->
        // include ':projectName' / include(":projectName")
        def m = (line =~ /include\s*\(?\s*['"]:\s*(\w[\w.-]*)/)
        if (m) names.add(m[0][1])
        // rootProject.name = "projectName"
        def m2 = (line =~ /rootProject\.name\s*=\s*["'](\w[\w.-]*)["']/)
        if (m2) names.add(m2[0][1])
    }
    names.removeAll(COMMON_MODULE_NAMES)
    return names
}

gradle.settingsEvaluated { settings ->
    def hash = Integer.toUnsignedString(settings.rootDir.absolutePath.hashCode(), 16)
    File stateFile = new File(System.getProperty("user.home"), ".gradle/cbm/${hash}.json")

    if (!stateFile.exists()) return

    try {
        def cbm = new JsonSlurper().parse(stateFile)
        def modules = cbm.modules
        if (!(modules instanceof List)) {
            println "[WARN] CBM: 'modules' 字段缺失或格式错误"
            return
        }

        def groupId = cbm.groupId ?: ""
        def activeFlavor = cbm.activeFlavor ?: ""

        println "[CBM] groupId=${groupId}, activeFlavor=${activeFlavor}, modules=${modules.size()}"

        modules.each { mod ->
            def modDir = mod.path ? new File(mod.path as String) : new File(settings.rootDir, "../${mod.name}_project")
            def modPath = modDir.absolutePath
            if (!modDir.exists()) {
                println "[WARN] CBM skipped: ${mod.name} not found at ${modPath}"
                return
            }
            if (mod.flavorAware && groupId && activeFlavor) {
                // 读取该 included build 实际包含的 project 名单，用于精确匹配
                def includedProjects = getIncludedProjectNames(modDir)
                println "[CBM] ${mod.name} projects: ${includedProjects}"
                settings.includeBuild(modPath) {
                    dependencySubstitution {
                        all { DependencySubstitution dep ->
                            if (dep.requested instanceof ModuleComponentSelector) {
                                def req = dep.requested
                                if (req.group == groupId) {
                                    // 优先匹配带 flavor 后缀的 artifact（正常情况）
                                    if (req.module.endsWith("-${activeFlavor}")) {
                                        def projectName = req.module[0..-(activeFlavor.length() + 2)]
                                        if (includedProjects.contains(projectName)) {
                                            dep.useTarget(project(":${projectName}"))
                                        }
                                    // 兜底：artifact 本身没有 flavor 后缀（flavorAware 错配时也能正常替换）
                                    } else if (includedProjects.contains(req.module)) {
                                        dep.useTarget(project(":${req.module}"))
                                    }
                                }
                            }
                        }
                    }
                }
                println "[CBM] includeBuild (flavor=${activeFlavor}): ${mod.name} -> ${modPath}"
            } else {
                settings.includeBuild(modPath)
                println "[CBM] includeBuild: ${mod.name} -> ${modPath}"
            }
        }
    } catch (Exception e) {
        println "[WARN] CBM: Failed to parse state file: ${e.message}"
    }
}
